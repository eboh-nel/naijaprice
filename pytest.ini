"""
Scheduled cleanup and maintenance tasks.
"""
from app.tasks.scrape_tasks import celery          # ← same app instance
from datetime import datetime, timedelta
from app.database import SessionLocal
from app.models import Listing, Price
from app.services.pricing import check_and_notify
from app.utils.logger import get_logger

logger = get_logger(__name__)


@celery.task(name="app.tasks.cleanup_tasks.mark_stale_listings")
def mark_stale_listings():
    """
    Mark listings as inactive if they haven't been seen in
    3× STALE_THRESHOLD_HOURS (default: 72h).
    Prevents showing products that are no longer listed.
    """
    from app.config import settings
    db = SessionLocal()
    try:
        cutoff = datetime.utcnow() - timedelta(hours=settings.STALE_THRESHOLD_HOURS * 3)
        stale = (
            db.query(Listing)
            .filter(Listing.is_active == True, Listing.last_seen_at < cutoff)
            .all()
        )
        count = len(stale)
        for listing in stale:
            listing.is_active = False
        db.commit()
        logger.info(f"Marked {count} listings as stale")
        return count
    finally:
        db.close()


@celery.task(name="app.tasks.cleanup_tasks.prune_old_prices")
def prune_old_prices(keep_days: int = 90):
    """
    Delete price records older than `keep_days` to keep the DB lean.
    We keep 90 days of history by default — enough for charts.
    """
    db = SessionLocal()
    try:
        cutoff = datetime.utcnow() - timedelta(days=keep_days)
        deleted = db.query(Price).filter(Price.scraped_at < cutoff).delete()
        db.commit()
        logger.info(f"Pruned {deleted} old price records (older than {keep_days} days)")
        return deleted
    finally:
        db.close()


@celery.task(name="app.tasks.cleanup_tasks.run_price_alert_check")
def run_price_alert_check():
    """
    Check all active price alerts and send notifications where the
    current lowest price is at or below the user's target.
    """
    db = SessionLocal()
    try:
        triggered = check_and_notify(db)
        return triggered
    finally:
        db.close()
